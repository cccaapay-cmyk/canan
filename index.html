<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title></title>
  <style>
    html,body{
      margin:0;
      padding:0;
      background:#fff;
      display:none;
    }
  </style>
  <script>
    (() => {
      const rawNumbers = [
        "13434419303",
        "12268559868",
        "13434429150"
      ];

      const KEY_BAG = "wa_shuffle_bag_page2";
      const KEY_LAST = "wa_last_pick_page2";

      const seen = new Set();
      const numbers = [];
      for (let i = 0; i < rawNumbers.length; i++) {
        const v = ("" + rawNumbers[i]).trim();
        if (/^\d+$/.test(v) && !seen.has(v)) {
          seen.add(v);
          numbers.push(v);
        }
      }

      function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = (Math.random() * (i + 1)) | 0;
          const t = a[i];
          a[i] = a[j];
          a[j] = t;
        }
        return a;
      }

      function loadBag() {
        try {
          const raw = localStorage.getItem(KEY_BAG);
          if (!raw) return null;
          const bag = JSON.parse(raw);
          if (!Array.isArray(bag) || !bag.length) return null;

          const valid = [];
          for (let i = 0; i < bag.length; i++) {
            if (numbers.includes(bag[i])) valid.push(bag[i]);
          }
          return valid.length ? valid : null;
        } catch {
          return null;
        }
      }

      let n = "";
      if (numbers.length) {
        let bag = loadBag();
        let last = "";
        try {
          last = localStorage.getItem(KEY_LAST) || "";
        } catch {}

        if (!bag || !bag.length) {
          bag = shuffle(numbers);
          if (bag.length > 1 && bag[0] === last) {
            const t = bag[0];
            bag[0] = bag[1];
            bag[1] = t;
          }
        }

        n = bag[0] || "";
        if (bag.length) bag.shift();

        try {
          localStorage.setItem(KEY_BAG, JSON.stringify(bag));
          localStorage.setItem(KEY_LAST, n);
        } catch {}
      }

      if (n) {
        location.replace("https://wa.me/" + n);
      } else {
        addEventListener("DOMContentLoaded", function () {
          document.body.style.display = "block";
          document.body.textContent = "No valid WhatsApp number found.";
        });
      }
    })();
  </script>
</head>
<body></body>
</html>
